<!--
  AURIX — INSTITUTIONAL EMAIL BASE TEMPLATE (reusable)
  ────────────────────────────────────────────────────────────────────────────
  ONE reusable base for all Aurix brand emails. Content is injected via slots so
  future campaigns change subject/title/body/CTA WITHOUT duplicating this HTML.

  Reusable slots (mustache): PREHEADER · TITLE · BODY_HTML · ACTION_BLOCK · CLOSING ·
  UNSUBSCRIBE_URL · YEAR. ACTION_BLOCK hosts a CTA / OTP code / nothing (see scripts/aurix-email.mjs).

  Email-safe: table layout, inline styles, system fonts (no external fonts/JS/
  video/remote CSS). Dark by design; honours the client's dark mode. Tested target
  set: Gmail, Apple Mail, Outlook, iOS, Android, desktop.
  Palette (official Aurix tokens): bg #030712 · surface #080D18 · electric #2684FF
  · text #E8EEF7 · muted #9FB0C7.
-->
<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="color-scheme" content="dark">
  <meta name="supported-color-schemes" content="dark light">
  <title>Your verification code</title>
  <!--[if mso]><style>* { font-family: Arial, sans-serif !important; }</style><![endif]-->
  <style>
    /* Progressive enhancement only — the email works fully without this block. */
    body { margin:0 !important; padding:0 !important; width:100% !important; background:#030712; }
    .aurix-cta:hover { filter:brightness(1.06); }
    @media only screen and (max-width:620px) {
      .aurix-container { width:100% !important; border-radius:0 !important; }
      .aurix-pad { padding-left:22px !important; padding-right:22px !important; }
      .aurix-cta-a { display:block !important; width:100% !important; box-sizing:border-box !important; }
    }
  </style>
</head>
<body style="margin:0; padding:0; background:#030712; -webkit-text-size-adjust:100%; -ms-text-size-adjust:100%;">
  <!-- Preheader (hidden preview text) -->
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; mso-hide:all; font-size:1px; line-height:1px; color:#030712;">Your Aurix verification code.&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;</div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#030712;">
    <tr>
      <td align="center" style="padding:32px 16px;">

        <!-- Container -->
        <table role="presentation" class="aurix-container" width="600" cellpadding="0" cellspacing="0" border="0"
               style="width:600px; max-width:600px; background:#080D18; border:1px solid #2684FF; border-radius:14px; box-shadow:0 0 40px rgba(38,132,255,0.14); overflow:hidden;">

          <!-- Header / wordmark -->
          <tr>
            <td class="aurix-pad" align="center" style="padding:34px 40px 8px 40px;">
              <span style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:22px; font-weight:800; letter-spacing:4px; color:#FFFFFF;">AURIX</span>
            </td>
          </tr>
          <tr><td style="padding:0 40px;"><div style="height:1px; line-height:1px; font-size:0; background:rgba(38,132,255,0.18);">&nbsp;</div></td></tr>

          <!-- Title -->
          <tr>
            <td class="aurix-pad" align="left" style="padding:30px 40px 6px 40px;">
              <h1 style="margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:30px; line-height:1.2; font-weight:800; color:#FFFFFF;">Your verification code</h1>
            </td>
          </tr>

          <!-- Body -->
          <tr>
            <td class="aurix-pad" align="left" style="padding:10px 40px 4px 40px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; line-height:1.62; color:#C7D3E3;">
              <p style="margin:0 0 16px 0;">Use the verification code below to securely access your Aurix account.</p>
              <p style="margin:0 0 16px 0;">Never share this code with anyone.</p>
            </td>
          </tr>

          <!-- ACTION BLOCK (reusable slot) — per email: a bulletproof CTA (launch), the OTP code
               block (verification), or empty (welcome prose). Injected by scripts/aurix-email.mjs so
               structure/branding stay identical across every Aurix email; only this block varies. -->
          <tr>
            <td class="aurix-pad" align="center" style="padding:24px 40px 30px 40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr><td align="center" style="background:#0C1424; border:1px solid rgba(38,132,255,0.45); border-radius:12px; padding:24px 16px;">
                  <div style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Courier New',monospace; font-size:40px; line-height:1.1; font-weight:800; letter-spacing:10px; color:#FFFFFF; text-indent:10px;">{{ .Token }}</div>
                </td></tr>
              </table>
            </td>
          </tr>

          <!-- Closing line (optional slot) -->
          <tr>
            <td class="aurix-pad" align="left" style="padding:2px 40px 26px 40px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:16px; line-height:1.6; color:#C7D3E3;"></td>
          </tr>

          <!-- Footer -->
          <tr><td style="padding:0 40px;"><div style="height:1px; line-height:1px; font-size:0; background:rgba(38,132,255,0.12);">&nbsp;</div></td></tr>
          <tr>
            <td class="aurix-pad" align="left" style="padding:22px 40px 30px 40px; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:13px; line-height:1.6; color:#7E8CA3;">
              <strong style="color:#C7D3E3;">The Aurix Team</strong><br>
              Aurix · Wealth Intelligence Platform<br>
              <span style="color:#4A566B;">&copy; 2026 Aurix</span>
            </td>
          </tr>

        </table>
        <!-- /Container -->

      </td>
    </tr>
  </table>
</body>
</html>
