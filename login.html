<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- AURIX-APP-DOMAIN-READY-1: no <base href> — relative links work under
       /Aurix/ (GitHub Pages) and at the root custom domain. -->
  <style>
    /* AURIX-MOBILE-HERO-LOADER-CHART-PREMIUM-1: paint the Aurix dark surface
       on the very first frame — ahead of the render-blocking styles.css — so
       iOS/PWA/mobile Safari never flashes a white frame before the auth form.
       Matches --bg (#05070f), the real body background, so there is no
       flash-then-shift when the stylesheet finishes parsing. */
    html, body { background:#05070f; margin:0; }
  </style>
  <title>AURIX — Acceso</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="theme-color" content="#0B0F1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aurix">
  <script>
    // PWA-CONSISTENCY-1: global build identifier + standalone detection.
    // Runs synchronously before any other script so a stale build cannot
    // serve a half-cached app. Same user + same account must render the
    // same code on Safari mobile, the iOS home-screen PWA, and desktop.
    (function() {
      window.AURIX_BUILD = 'pwa-consistency-2-lr3';
      try {
        var KEY     = 'aurix_build';
        // P0 MOBILE-BOOT-HARDFIX — NO reload on build change (the purge+reload could
        // infinite-loop on a stale-cached page). Just record the build + best-effort,
        // non-blocking cleanup of any legacy service worker / cache. Always boots.
        try { localStorage.setItem(KEY, window.AURIX_BUILD); } catch (_) {}
        try {
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            navigator.serviceWorker.getRegistrations().then(function(regs) { regs.forEach(function(r) { try { r.unregister(); } catch (_) {} }); }).catch(function() {});
          }
          if (typeof caches !== 'undefined' && caches.keys) {
            caches.keys().then(function(keys) { keys.forEach(function(k) { try { caches.delete(k); } catch (_) {} }); }).catch(function() {});
          }
        } catch (_) {}
        // Standalone detection — iOS Safari + modern display-mode media query.
        var iosStandalone = window.navigator.standalone === true;
        var mqStandalone  = false;
        try { mqStandalone = window.matchMedia('(display-mode: standalone)').matches; } catch (_) {}
        var isStandalone  = iosStandalone || mqStandalone;
        window.IS_STANDALONE     = isStandalone;
        window.IS_IOS_STANDALONE = iosStandalone;
        document.documentElement.setAttribute('data-standalone', isStandalone ? 'true' : 'false');
        if (iosStandalone) document.documentElement.setAttribute('data-ios-standalone', 'true');
      } catch (_) { /* boot guard must never throw */ }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-5);
      background: var(--bg);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -30%;
      background:
        radial-gradient(circle 750px at 22% 32%, rgba(79,142,247,.10) 0%, transparent 60%),
        radial-gradient(circle 600px at 80% 74%, rgba(39,199,104,.06) 0%, transparent 60%);
      animation: beta-bg-drift 26s ease-in-out infinite alternate;
      pointer-events: none;
    }

    /* ── Invite section ── */
    .invite-section {
      width: 100%;
      margin-bottom: var(--space-5);
    }

    .invite-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .invite-check {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
      color: var(--green);
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 240ms var(--ease-out), transform 240ms var(--ease-spring);
    }

    .invite-check.visible {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Inputs ── */
    .auth-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 200ms ease, background 200ms ease;
    }

    .auth-input:focus {
      border-color: rgba(255, 255, 255, 0.22);
      background: rgba(255, 255, 255, 0.06);
    }

    .auth-input::placeholder { color: var(--text-dim); }
    .auth-input:disabled     { opacity: 0.35; }

    .otp-input {
      text-align: center;
      font-size: 22px;
      letter-spacing: 0.25em;
      font-weight: 600;
    }

    /* ── Auth section (locked/unlocked) ── */
    .auth-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .locked {
      opacity: 0.4;
      filter: blur(4px);
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    .unlocked {
      opacity: 1;
      filter: blur(0);
      transform: translateY(0);
      pointer-events: auto;
      transition: opacity 0.3s ease, filter 0.3s ease, transform 0.3s ease;
    }

    /* ── Auth title ── */
    .auth-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-bright);
      letter-spacing: -0.01em;
      margin-bottom: 2px;
    }

    /* ── OTP hint ── */
    .otp-hint {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
    }

    /* OTP destination email — surfaced before the code field so a typo in
       the email is caught before the user waits for a code that won't come. */
    .otp-dest {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-bright);
      text-align: center;
      letter-spacing: 0.01em;
      word-break: break-all;
      margin: -4px 0 2px;
    }

    /* ── Submit button ── */
    .auth-btn {
      width: 100%;
      margin-top: 2px;
      padding: 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(79, 142, 247, 0.25);
      background: rgba(79, 142, 247, 0.14);
      color: #7fb8ff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: opacity 160ms ease, transform 120ms ease;
    }

    .auth-btn:hover:not(:disabled) { opacity: 0.82; }
    .auth-btn:active:not(:disabled) { transform: scale(0.97); }
    .auth-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Feedback message ── */
    .auth-error {
      font-size: 12px;
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.01em;
    }

    /* ── Secondary links ── */
    .auth-link {
      cursor: pointer;
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      letter-spacing: 0.01em;
      transition: color 160ms ease;
      margin-top: 2px;
    }

    .auth-link:hover { color: var(--text); }

    /* OTP-RESEND-1: button reset so a <button> can use .auth-link
       styling and pick up a native :disabled state during cooldown. */
    button.auth-link {
      background: none;
      border: none;
      padding: 0;
      font: inherit;
      width: 100%;
    }
    button.auth-link:disabled { opacity: 0.4; cursor: not-allowed; }
    button.auth-link:disabled:hover { color: var(--text-muted); }
  </style>
</head>
<body>

  <div class="beta-container">

    <div class="beta-logo-above">
      <span class="logo-aurix">AURIX</span>
    </div>

    <div class="beta-card">
      <div class="beta-access-label" data-i18n="lg.access">Acceso privado</div>
      <p class="beta-hint" data-i18n="lg.hint">Aurix se encuentra actualmente en beta privada. Introduce tu código de invitación para continuar.</p>

      <!-- Invite gate -->
      <div class="invite-section">
        <div class="invite-row">
          <input id="inviteCode" class="auth-input" type="text"
                 placeholder="Código de invitación" data-i18n-ph="lg.invitePh"
                 autocomplete="off" spellcheck="false">
          <svg id="inviteCheck" class="invite-check" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/>
          </svg>
        </div>
      </div>

      <!-- Email step (locked until invite) -->
      <div id="authSection" class="auth-section locked">
        <h2 class="auth-title" data-i18n="lg.signin">Acceder</h2>
        <input id="email" type="email" class="auth-input"
               placeholder="correo electrónico" data-i18n-ph="lg.emailPh"
               autocomplete="email" disabled>
        <button id="auth-submit" class="auth-btn" data-i18n="lg.sendCode" disabled>Enviar código de acceso</button>
        <p id="auth-error" class="auth-error"></p>
      </div>

      <!-- OTP step (shown after email is sent) -->
      <div id="otpSection" class="auth-section" style="display:none">
        <h2 class="auth-title" data-i18n="lg.verify">Verificar código</h2>
        <p class="otp-hint" data-i18n="lg.otpHint">Estamos enviando el código de acceso a:</p>
        <p class="otp-dest" id="otpDestEmail"></p>
        <input id="otp-code" type="text" inputmode="numeric" pattern="[0-9]*"
               class="auth-input otp-input" placeholder="00000000"
               maxlength="8" autocomplete="one-time-code">
        <button id="otp-submit" class="auth-btn" data-i18n="lg.verify">Verificar código</button>
        <p id="otp-error" class="auth-error"></p>
        <button id="otp-resend" type="button" class="auth-link" data-i18n="lg.resend">Reenviar código</button>
        <p class="auth-link" id="otp-back" data-i18n="lg.otherEmail">Usar otro email</p>
      </div>

      <p class="beta-version"><span data-i18n="lg.privateBeta">Private Beta</span> &bull; v0.1</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.0"></script>
  <script src="config.js"></script>
  <script src="services/ux.js"></script>
  <script>
    'use strict';

    // OBSERVABILITY-LOGIN-1: tiny inline reporter for the login flow.
    // Mirrors the app.js reporter contract — same /api/client-log endpoint,
    // same payload allowlist, no PII (no email, invite code or OTP token).
    // Removable: delete this IIFE plus every _reportLoginSafe call site.
    (function () {
      const _isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
      if (_isDev) { window._reportLogin = function () {}; return; }
      try {
        // AURIX-APP-DOMAIN-READY-1: API origin from the shared source of truth
        // (window.AURIX_API_BASE in config.js, loaded just above). Falls back to
        // the current Vercel project so a missing config can never break login.
        const _apiBase    = (typeof window.AURIX_API_BASE === 'string')
          ? window.AURIX_API_BASE
          : 'https://isa-portfolio-ten.vercel.app';
        const ENDPOINT    = _apiBase + '/api/client-log';
        const MAX_REPORTS = 5;
        const seen        = new Set();
        let sent          = 0;
        function trim(s, n) {
          if (typeof s !== 'string') return '';
          return s.length > n ? s.slice(0, n) : s;
        }
        function send(kind, msg, stack) {
          try {
            if (navigator.onLine === false) return;
            if (sent >= MAX_REPORTS) return;
            const sig = (kind || '') + '|' + (msg || '').slice(0, 120);
            if (seen.has(sig)) return;
            seen.add(sig);
            sent++;
            const payload = {
              build: window.AURIX_BUILD || '',
              ts:    Date.now(),
              kind:  kind || 'unknown',
              msg:   trim(msg, 500),
              stack: trim(stack, 1500),
              path:  trim(location.pathname, 200),
              ua:    trim(navigator.userAgent, 300),
            };
            fetch(ENDPOINT, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify(payload),
              keepalive: true,
              mode:    'cors',
              credentials: 'omit',
            }).catch(function () {});
          } catch (_) { /* reporter must never throw */ }
        }
        window._reportLogin = send;
        window.addEventListener('error', function (e) {
          try {
            const file = (e && e.filename) || '';
            if (file.indexOf('chrome-extension://') === 0 ||
                file.indexOf('moz-extension://')    === 0 ||
                file.indexOf('safari-extension://') === 0) return;
            send('uncaught', (e && e.message) || 'uncaught', (e && e.error && e.error.stack) || '');
          } catch (_) {}
        });
        window.addEventListener('unhandledrejection', function (e) {
          try {
            const r = e && e.reason;
            send('unhandledrejection', r ? (r.message || String(r)) : 'unhandledrejection', (r && r.stack) || '');
          } catch (_) {}
        });
      } catch (_) { /* reporter setup must never throw */ }
    })();

    function _reportLoginSafe(kind, msg, stack) {
      try {
        if (typeof window._reportLogin === 'function') {
          window._reportLogin(kind, msg, stack);
        }
      } catch (_) {}
    }

    // ── Supabase client ────────────────────────────────────────
    let client = null;
    if (typeof SUPABASE_URL !== 'undefined' && typeof SUPABASE_ANON_KEY !== 'undefined' && window.supabase) {
      client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    }

    // ── i18n (EN/ES) ───────────────────────────────────────────
    // Language resolution: ?lang= handoff from the landing (cross-origin, since
    // localStorage is not shared) → else the shared 'portfolio_lang' key → else
    // Spanish. The choice is persisted so index.html stays in the same language
    // after sign-in. No more hardcoded Spanish on this screen.
    const LOGIN_LANG = (function () {
      try {
        const p = new URLSearchParams(location.search).get('lang');
        if (p === 'en' || p === 'es') { localStorage.setItem('portfolio_lang', p); return p; }
        const s = localStorage.getItem('portfolio_lang');
        if (s === 'en' || s === 'es') return s;
      } catch (_) {}
      return 'es';
    })();
    document.documentElement.lang = LOGIN_LANG;
    const LOGIN_I18N = {
      es: {
        'lg.title': 'AURIX — Acceso',
        'lg.access': 'Acceso privado',
        'lg.hint': 'Aurix se encuentra actualmente en beta privada. Introduce tu código de invitación para continuar.',
        'lg.invitePh': 'Código de invitación',
        'lg.signin': 'Acceder',
        'lg.emailPh': 'correo electrónico',
        'lg.sendCode': 'Enviar código de acceso',
        'lg.verify': 'Verificar código',
        'lg.otpHint': 'Estamos enviando el código de acceso a:',
        'lg.resend': 'Reenviar código',
        'lg.otherEmail': 'Usar otro email',
        'lg.privateBeta': 'Beta privada',
        'lg.err.email': 'Introduce un email válido',
        'lg.err.otpFormat': 'Introduce un código válido (6-8 dígitos).',
        'lg.err.rate': 'Demasiados intentos. Espera unos segundos.',
        'lg.err.otp-invalid': 'Código incorrecto o caducado.',
        'lg.err.network': 'No se pudo conectar. Revisa tu conexión.',
        'lg.err.generic': 'No se pudo completar la operación. Inténtalo de nuevo.',
        'lg.btn.sending': 'Enviando código...',
        'lg.btn.verifying': 'Verificando...',
        'lg.btn.resending': 'Reenviando...',
        'lg.otp.resent': 'Nuevo código enviado. Revisa tu email.',
        'lg.cooldown': 'Demasiados intentos. Espera {n}s',
        'lg.resendIn': 'Reenviar en {n}s'
      },
      en: {
        'lg.title': 'AURIX — Access',
        'lg.access': 'Private access',
        'lg.hint': 'Aurix is currently in private beta. Enter your invitation code to continue.',
        'lg.invitePh': 'Invitation code',
        'lg.signin': 'Sign in',
        'lg.emailPh': 'email address',
        'lg.sendCode': 'Send access code',
        'lg.verify': 'Verify code',
        'lg.otpHint': 'We’re sending the access code to:',
        'lg.resend': 'Resend code',
        'lg.otherEmail': 'Use another email',
        'lg.privateBeta': 'Private Beta',
        'lg.err.email': 'Enter a valid email',
        'lg.err.otpFormat': 'Enter a valid code (6–8 digits).',
        'lg.err.rate': 'Too many attempts. Please wait a few seconds.',
        'lg.err.otp-invalid': 'Incorrect or expired code.',
        'lg.err.network': 'Could not connect. Check your connection.',
        'lg.err.generic': 'Something went wrong. Please try again.',
        'lg.btn.sending': 'Sending code…',
        'lg.btn.verifying': 'Verifying…',
        'lg.btn.resending': 'Resending…',
        'lg.otp.resent': 'New code sent. Check your email.',
        'lg.cooldown': 'Too many attempts. Wait {n}s',
        'lg.resendIn': 'Resend in {n}s'
      }
    };
    function tL(k) { return (LOGIN_I18N[LOGIN_LANG] && LOGIN_I18N[LOGIN_LANG][k]) || LOGIN_I18N.es[k] || ''; }
    function applyLoginI18n() {
      const tt = tL('lg.title'); if (tt) document.title = tt;
      document.querySelectorAll('[data-i18n]').forEach(function (n) {
        const v = tL(n.getAttribute('data-i18n')); if (v) n.textContent = v;
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(function (n) {
        const v = tL(n.getAttribute('data-i18n-ph')); if (v) n.setAttribute('placeholder', v);
      });
    }
    applyLoginI18n();

    const _SAFE_REDIRECT_TARGETS = new Set([
      'index.html',
      'login.html',
      'reset.html',
      'reset-password.html',
    ]);
    // P0-ROUTING-LOOP-BREAKER (mirror of app.js safeRedirect) — a shared sessionStorage redirect log
    // stops an index⇄login ping-pong from flickering forever. Returns true if the nav was issued.
    var _AURIX_REDIRECT_MAX = 3, _AURIX_REDIRECT_WINDOW_MS = 10000;
    function safeRedirect(path, source) {
      const target  = _SAFE_REDIRECT_TARGETS.has(path) ? path : 'login.html';
      try {
        const now = Date.now();
        let log = [];
        try { log = JSON.parse(sessionStorage.getItem('aurix_redirect_log') || '[]'); } catch (_) { log = []; }
        if (!Array.isArray(log)) log = [];
        log = log.filter(function (e) { return e && (now - e.ts) < _AURIX_REDIRECT_WINDOW_MS; });
        if (log.length >= _AURIX_REDIRECT_MAX) {
          try { sessionStorage.setItem('aurix_redirect_broken', JSON.stringify({ at: now, target: target, source: source || null, bounces: log.length })); } catch (_) {}
          try { console.warn('[AUTH][REDIRECT-LOOP-BREAK] login suppressed →' + target + ' after ' + log.length + ' bounces'); } catch (_) {}
          return false;
        }
        log.push({ ts: now, target: target, from: window.location.pathname, source: source || null });
        try { sessionStorage.setItem('aurix_redirect_log', JSON.stringify(log)); } catch (_) {}
        try { sessionStorage.setItem('aurix_last_redirect', JSON.stringify({ target: target, source: source || null, ts: now })); } catch (_) {}
      } catch (_) {}
      const onAurix = window.location.pathname.startsWith('/Aurix/');
      const base    = window.location.origin + (onAurix ? '/Aurix/' : '/');
      window.location.href = base + target;
      return true;
    }

    if (client) {
      client.auth.getSession().then(({ data: { session } }) => {
        if (session) safeRedirect('index.html', 'login:getSession');
      });

      client.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) safeRedirect('index.html', 'login:SIGNED_IN');
      });
    }

    // ── DOM refs ───────────────────────────────────────────────
    const inviteInput  = document.getElementById('inviteCode');
    const authSection  = document.getElementById('authSection');
    const inviteCheck  = document.getElementById('inviteCheck');
    const emailEl      = document.getElementById('email');
    const submitBtn    = document.getElementById('auth-submit');
    const errorEl      = document.getElementById('auth-error');
    const otpSection   = document.getElementById('otpSection');
    const otpCodeEl    = document.getElementById('otp-code');
    const otpSubmitBtn = document.getElementById('otp-submit');
    const otpErrorEl   = document.getElementById('otp-error');
    const otpBackEl    = document.getElementById('otp-back');
    const otpResendEl  = document.getElementById('otp-resend');

    // EMAIL-VALIDATE-1: basic syntactic check before issuing an OTP
    // request. Stricter than `includes('@')` (which let "a@", "@b",
    // "test domain@x" through) but intentionally NOT full RFC 5322 —
    // the OTP send itself is the authoritative validator. Trims first
    // so trailing spaces from autofill / paste do not block valid
    // addresses. Returns false for null / undefined / non-string.
    function _isValidEmail(raw) {
      if (typeof raw !== 'string') return false;
      const s = raw.trim();
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);
    }

    // OTP-RESEND-1: friendly Spanish messages for the auth surfaces.
    // We never show raw Supabase error text to the user — every error
    // is classified into one of the known buckets below. Generic stays
    // as the safe fallback so a future SDK error string never leaks.
    function authErr(cls) { return tL('lg.err.' + cls) || tL('lg.err.generic'); }
    function _classifyAuthError(err) {
      const msg    = ((err && (err.message || err.error_description)) || '').toLowerCase();
      const status = (err && (err.status || err.statusCode)) || 0;
      if (status === 429 || msg.includes('rate') || msg.includes('too many') || msg.includes('throttle')) return 'rate';
      if (msg.includes('expired') || msg.includes('invalid') || msg.includes('token') || msg.includes('otp')) return 'otp-invalid';
      if (msg.includes('fetch') || msg.includes('network') || msg.includes('offline')) return 'network';
      return 'generic';
    }
    function _authErrorText(err) {
      return authErr(_classifyAuthError(err));
    }

    // ── Invite gate ────────────────────────────────────────────
    // SUPABASE-RLS-CLIENT-MIGRATION: invite_codes is now RLS-locked away
    // from anon/authenticated. The validate_invite_code SECURITY DEFINER
    // RPC is the only client-callable surface and returns just a boolean,
    // so no row data (owner, used_count, max_uses…) leaks to the browser.
    async function validateInvite(code) {
      if (!client || !code) return { valid: false };
      try {
        const { data, error } = await client.rpc(
          'validate_invite_code',
          { p_code: code }
        );
        if (error) {
          // Network / RPC error — surface to callers/devtools while
          // keeping the same locked-UX as an invalid code.
          _reportLoginSafe('invite-rpc', error.message || 'rpc error', '');
          return { valid: false, error: error.message || 'network' };
        }
        return { valid: data === true };
      } catch (e) {
        _reportLoginSafe('invite-rpc', (e && e.message) || 'network', (e && e.stack) || '');
        return { valid: false, error: (e && e.message) ? e.message : 'network' };
      }
    }

    // INVITE-DEBOUNCE-1: the previous handler fired validate_invite_code
    // on every keystroke (7 RPCs to validate "AURIX24"). Debounce 250 ms
    // after the last edit and skip codes shorter than the minimum length
    // so the RPC only runs when the user has actually stopped typing a
    // plausible code. _inviteSeq + a re-check against the current input
    // value protect against a stale older RPC resolving after a newer
    // one and mis-unlocking the auth section.
    let _inviteTimer = null;
    let _inviteSeq   = 0;
    const INVITE_MIN_LEN = 3;
    inviteInput.addEventListener('input', () => {
      clearTimeout(_inviteTimer);
      const code = inviteInput.value.trim().toUpperCase();
      if (code.length < INVITE_MIN_LEN) {
        // Below the minimum length we never call the RPC; explicitly
        // re-lock so a prior unlock state from a longer string can't
        // linger after a delete.
        lockAuth();
        return;
      }
      _inviteTimer = setTimeout(async () => {
        const myCode = code;
        const seq    = ++_inviteSeq;
        const result = await validateInvite(myCode);
        // Race guard: ignore responses from older keystrokes and also
        // verify the user hasn't edited the input mid-flight.
        if (seq !== _inviteSeq) return;
        if (myCode !== inviteInput.value.trim().toUpperCase()) return;
        if (result.valid) unlockAuth();
        else              lockAuth();
      }, 250);
    });

    // ── State ──────────────────────────────────────────────────
    let otpStep        = false;
    let isSubmitting   = false;
    let cooldown       = false;
    let retryCount     = 0;
    let _cooldownTimer = null;

    // ── Auth lock / unlock ─────────────────────────────────────
    function lockAuth() {
      emailEl.disabled   = true;
      submitBtn.disabled = true;
      authSection.classList.remove('unlocked');
      authSection.classList.add('locked');
      inviteCheck.classList.remove('visible');
    }

    function unlockAuth() {
      emailEl.disabled = false;
      authSection.classList.remove('locked');
      authSection.classList.add('unlocked');
      inviteCheck.classList.add('visible');
      emailEl.focus();
      updateSubmitState();
    }

    // ── OTP step transitions ───────────────────────────────────
    function showOtpStep() {
      otpStep = true;
      authSection.style.display = 'none';
      otpSection.style.display  = 'flex';
      // F (LR.3): show the destination email so a typo is caught before the
      // user waits for a code that will never arrive. textContent avoids any
      // markup injection from the address. Falls back to the email field.
      const _destEl = document.getElementById('otpDestEmail');
      if (_destEl) {
        _destEl.textContent =
          (localStorage.getItem('aurix_otp_email') || (emailEl && emailEl.value.trim()) || '');
      }
      otpCodeEl.value            = '';
      otpErrorEl.innerText       = '';
      otpSubmitBtn.disabled      = true;
      otpSubmitBtn.innerText     = tL('lg.verify');
      otpCodeEl.focus();
    }

    function showEmailStep() {
      otpStep = false;
      otpSection.style.display  = 'none';
      authSection.style.display = '';
      authSection.classList.remove('locked');
      authSection.classList.add('unlocked');
      emailEl.disabled     = false;
      localStorage.removeItem('aurix_otp_email');
      otpErrorEl.innerText = '';
      otpCodeEl.value      = '';
      updateSubmitState();
      emailEl.focus();
    }

    // ── Init ───────────────────────────────────────────────────
    const savedEmail = localStorage.getItem('last_email');
    if (savedEmail) emailEl.value = savedEmail;

    emailEl.addEventListener('input', updateSubmitState);
    emailEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitBtn.click();
    });

    lockAuth();

    // ── Submit button state (single UI authority) ─────────────
    function updateSubmitState() {
      if (cooldown) {
        submitBtn.disabled  = true;
        submitBtn.innerText = tL('lg.sendCode');
        return;
      }
      const validEmail = _isValidEmail(emailEl.value);
      submitBtn.disabled  = !validEmail;
      submitBtn.innerText = tL('lg.sendCode');
    }

    function clearTimer() {
      if (_cooldownTimer !== null) {
        clearInterval(_cooldownTimer);
        _cooldownTimer = null;
      }
    }

    function resetCooldownState() {
      clearTimer();
      cooldown = false;
      retryCount = 0;
      localStorage.removeItem('cooldown_until');
      errorEl.innerText = '';
      errorEl.style.color = 'var(--red)';
      updateSubmitState();
    }

    function startCooldown(until) {
      clearTimer();
      cooldown = true;
      updateSubmitState();

      const tick = () => {
        const remaining = Math.ceil((until - Date.now()) / 1000);
        if (remaining <= 0) { resetCooldownState(); return; }
        errorEl.style.color = 'orange';
        errorEl.innerText = tL('lg.cooldown').replace('{n}', remaining);
      };

      tick();
      _cooldownTimer = setInterval(tick, 1000);
    }

    function handleRateLimit() {
      retryCount++;
      const waitMs = retryCount === 1 ? 60000
                   : retryCount === 2 ? 120000
                   : 300000;
      const until = Date.now() + waitMs;
      localStorage.setItem('cooldown_until', until);
      startCooldown(until);
    }

    function isRateLimitError(err) {
      return (err?.message || '').toLowerCase().includes('rate');
    }

    // ── Email submit → send OTP ────────────────────────────────
    submitBtn.onclick = async () => {
      if (isSubmitting) return;
      isSubmitting = true;

      try {
        const email = emailEl.value.trim();
        if (!_isValidEmail(email)) {
          errorEl.style.color = 'var(--red)';
          errorEl.innerText = tL('lg.err.email');
          return;
        }

        // Reset backoff when user changes email
        const lastEmail = localStorage.getItem('last_email');
        if (email !== lastEmail) {
          retryCount = 0;
          localStorage.removeItem('cooldown_until');
        }

        errorEl.innerText = '';
        window.setButtonBusy(submitBtn, true, tL('lg.btn.sending'));

        console.log('OTP REQUEST FIRED');

        // OTP-RESEND-1: catch thrown network failures so they route
        // through the classifier instead of falling silently through
        // try/finally. Supabase resolves auth errors as data; fetch
        // failures throw, so we need both paths.
        let sendErr = null;
        try {
          const { error } = await client.auth.signInWithOtp({
            email,
            options: { shouldCreateUser: true }
          });
          sendErr = error || null;
        } catch (e) {
          sendErr = e;
        }

        if (sendErr) {
          console.log('OTP error:', sendErr);
          window.setButtonBusy(submitBtn, false);
          if (isRateLimitError(sendErr) || _classifyAuthError(sendErr) === 'rate') {
            handleRateLimit();
            return;
          }
          _reportLoginSafe('otp-send', (sendErr.message || String(sendErr)), sendErr.stack || '');
          errorEl.style.color = 'var(--red)';
          errorEl.innerText   = _authErrorText(sendErr);
          updateSubmitState();
          return;
        }

        console.log('OTP success → showing OTP step');
        localStorage.setItem('aurix_otp_email', email);
        localStorage.setItem('last_email', email);
        resetCooldownState();
        showOtpStep();

      } finally {
        isSubmitting = false;
      }
    };

    // ── OTP input — enforce numeric, enable button at 6 digits ─
    otpCodeEl.addEventListener('input', () => {
      otpCodeEl.value = otpCodeEl.value.replace(/\D/g, '').slice(0, 8);
      otpSubmitBtn.disabled = otpCodeEl.value.length < 6;
    });

    otpCodeEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') otpSubmitBtn.click();
    });

    // ── OTP submit → verify code ───────────────────────────────
    let isVerifying = false;
    otpSubmitBtn.addEventListener('click', async () => {
      if (isVerifying) return;
      isVerifying = true;

      try {
        const email = localStorage.getItem('aurix_otp_email');
        const code  = otpCodeEl.value.trim();

        if (!email) { showEmailStep(); return; }

        if (!/^\d{6,8}$/.test(code)) {
          otpErrorEl.style.color = 'var(--red)';
          otpErrorEl.innerText   = tL('lg.err.otpFormat');
          return;
        }

        otpErrorEl.innerText = '';
        window.setButtonBusy(otpSubmitBtn, true, tL('lg.btn.verifying'));

        let verifyErr = null;
        try {
          const { error } = await client.auth.verifyOtp({
            email,
            token: code,
            type: 'email'
          });
          verifyErr = error || null;
        } catch (e) {
          // OTP-RESEND-1: a thrown fetch error (offline / DNS) is a
          // 'network' class. Surface it via the classifier instead of
          // letting the unhandled promise reject silently.
          verifyErr = e;
        }

        if (verifyErr) {
          otpErrorEl.style.color = 'var(--red)';
          // Force the OTP-invalid bucket when the SDK returned an
          // error object without a clear class — verifyOtp failures
          // are almost always wrong/expired codes.
          const cls = _classifyAuthError(verifyErr);
          const txt = authErr((cls === 'network' || cls === 'rate') ? cls : 'otp-invalid');
          // Skip the two normal-user-feedback buckets ('otp-invalid' = wrong
          // or expired code, 'rate' = throttled). Only network/generic
          // failures reach the reporter.
          if (cls !== 'otp-invalid' && cls !== 'rate') {
            _reportLoginSafe('otp-verify', (verifyErr.message || String(verifyErr)), verifyErr.stack || '');
          }
          otpErrorEl.innerText = txt;
          window.setButtonBusy(otpSubmitBtn, false);
          return;
        }

        localStorage.removeItem('aurix_otp_email');
        safeRedirect('index.html');

      } finally {
        isVerifying = false;
      }
    });

    // ── OTP resend (cooldown 30s) ──────────────────────────────
    // OTP-RESEND-1: lets users re-trigger signInWithOtp without
    // abandoning the OTP step. Invite gate is preserved implicitly:
    // the OTP step is only reachable after a successful invite +
    // signInWithOtp earlier in this flow (or via the localStorage
    // restore at the bottom, which itself depends on a prior gated
    // OTP send), so resend cannot bypass the invite check.
    let isResending = false;
    let _resendTimer = null;
    function _clearResendTimer() {
      if (_resendTimer) { clearInterval(_resendTimer); _resendTimer = null; }
    }
    function _resetResendButton() {
      _clearResendTimer();
      otpResendEl.disabled  = false;
      otpResendEl.innerText = tL('lg.resend');
    }
    function _startResendCooldown(seconds) {
      _clearResendTimer();
      const until = Date.now() + seconds * 1000;
      otpResendEl.disabled = true;
      const tick = () => {
        const remaining = Math.ceil((until - Date.now()) / 1000);
        if (remaining <= 0) { _resetResendButton(); return; }
        otpResendEl.innerText = tL('lg.resendIn').replace('{n}', remaining);
      };
      tick();
      _resendTimer = setInterval(tick, 1000);
    }

    otpResendEl.addEventListener('click', async () => {
      if (isResending || otpResendEl.disabled) return;
      const email = localStorage.getItem('aurix_otp_email') || emailEl.value.trim();
      if (!email) { showEmailStep(); return; }

      isResending = true;
      otpErrorEl.innerText = '';
      window.setButtonBusy(otpResendEl, true, tL('lg.btn.resending'));

      let resendErr = null;
      try {
        const { error } = await client.auth.signInWithOtp({
          email,
          options: { shouldCreateUser: true }
        });
        resendErr = error || null;
      } catch (e) {
        resendErr = e;
      }

      // Restore the resend button before either branch runs. On the
      // success path, _startResendCooldown will re-disable + relabel
      // with the countdown; on the error path, the user can retry.
      window.setButtonBusy(otpResendEl, false);

      if (resendErr) {
        otpErrorEl.style.color = 'var(--red)';
        otpErrorEl.innerText   = _authErrorText(resendErr);
        if (!(isRateLimitError(resendErr) || _classifyAuthError(resendErr) === 'rate')) {
          _reportLoginSafe('otp-resend', (resendErr.message || String(resendErr)), resendErr.stack || '');
        }
      } else {
        otpErrorEl.style.color = 'var(--text-muted)';
        otpErrorEl.innerText   = tL('lg.otp.resent');
        _startResendCooldown(30);
      }
      isResending = false;
    });

    otpBackEl.addEventListener('click', () => {
      _resetResendButton();
      showEmailStep();
    });

    // ── Cooldown restore — hard reset if expired (prevents ghost cooldown) ──
    const storedUntil = Number(localStorage.getItem('cooldown_until')) || 0;
    if (storedUntil <= Date.now()) {
      localStorage.removeItem('cooldown_until');
      retryCount = 0;
      resetCooldownState();
    } else {
      startCooldown(storedUntil);
    }

    // ── Self-heal on focus (iOS suspends timers) ───────────────
    window.addEventListener('focus', () => {
      const until = Number(localStorage.getItem('cooldown_until')) || 0;
      if (until <= Date.now()) resetCooldownState();
    });

    // ── OTP step restore (iOS PWA may reload mid-flow) ─────────
    const pendingEmail = localStorage.getItem('aurix_otp_email');
    if (pendingEmail) {
      emailEl.value = pendingEmail;
      showOtpStep();
    }
  </script>

</body>
</html>
