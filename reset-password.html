<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <base href="/Aurix/">
  <!--
    RESET-CANONICAL-1: legacy alias for the password-reset page.
    The canonical entrypoint is /Aurix/reset.html. This stub stays so
    Supabase Auth email templates that still point at reset-password
    keep working — it forwards the URL hash (#access_token=…) and the
    search string verbatim so the recovery exchange completes after
    redirect. New templates should point directly at /Aurix/reset.html.
  -->
  <title>AURIX — Nueva contraseña</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <meta name="theme-color" content="#0B0F1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Aurix">
  <script>
    (function () {
      var target = '/Aurix/reset.html'
        + (window.location.search || '')
        + (window.location.hash   || '');
      // replace() avoids polluting back-button history with this alias.
      window.location.replace(target);
    })();
  </script>
</head>
<body></body>
</html>
