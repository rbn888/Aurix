<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURIX timer-proof</title>
</head>
<body style="background:#ffffff;color:#000000;font-family:-apple-system,system-ui,sans-serif;font-size:22px;padding:20px;line-height:1.5">
  <div style="font-size:28px;font-weight:bold">TIMER PROOF LOADED</div>
  <div>build: timer-proof-2026-06-25T19:34:17Z</div>
  <div id="ts">timestamp: …</div>
  <div id="ua" style="font-size:14px;word-break:break-word">userAgent: …</div>
  <hr>
  <div id="tick" style="font-size:34px;font-weight:bold">tick: 0</div>
  <div id="status" style="font-size:30px;font-weight:bold;color:#0a58ca">esperando 5s…</div>
  <script>
    // Absolute minimal proof that Safari iPhone runs inline JS + timers + DOM updates.
    // Plain document flow only; no external CSS, no app.js, no overlays, no animations.
    try { document.getElementById('ts').textContent = 'timestamp: ' + new Date().toISOString(); } catch (e) {}
    try { document.getElementById('ua').textContent = 'userAgent: ' + navigator.userAgent; } catch (e) {}
    var n = 0;
    var iv = setInterval(function () {
      n++;
      var el = document.getElementById('tick');
      if (el) el.textContent = 'tick: ' + n;
    }, 1000);
    setTimeout(function () {
      var s = document.getElementById('status');
      if (s) { s.textContent = 'TIMER FIRED'; s.style.color = '#198754'; }
    }, 5000);
  </script>
</body>
</html>
